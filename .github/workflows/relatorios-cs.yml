name: Relatórios CS → SharePoint

on:
  # Disparo manual pelo GitHub
  workflow_dispatch:

  # Agendamento automático: todo dia às 20:00 (horário de Brasília = 23:00 UTC)
  schedule:
    - cron: '0 23 * * *'

jobs:
  gerar-e-enviar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout do repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Instalar Chrome e Xvfb para o Selenium
      - name: Instalar Chrome e Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      # 4. Instalar dependências Python
      - name: Instalar dependências
        run: pip install -r requirements.txt

      # 5. Criar .env com credenciais do RPA
      - name: Criar .env
        run: |
          cat > .env << 'EOF'
          CV_EMAIL=${{ secrets.CS_CV_EMAIL }}
          CV_SENHA=${{ secrets.CS_CV_SENHA }}
          EOF

      # 6. Executar script com display virtual
      - name: Gerar relatórios e enviar para SharePoint
        run: xvfb-run python main.py

      # 7. Salvar artefatos (disponível por 7 dias no GitHub)
      - name: Salvar artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-cs-${{ github.run_id }}
          path: powerbi_data/*.csv
          retention-days: 7
          if-no-files-found: warn
